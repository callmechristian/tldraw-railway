[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/server.cjs"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# NOTE: Railway does not create volumes through railway.toml. After the first
# deploy, attach a volume to this service at /data so rooms and assets persist.
